name: Check Supabase types.ts freshness

on:
  push:
    branches: [main]

jobs:
  check-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate fresh types from live schema
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          npx supabase gen types typescript --project-id wayawbosopwqyivacxah --schema public > /tmp/types-fresh.ts

      - name: Compare against committed types.ts
        run: |
          FRESH_LINES=$(wc -l < /tmp/types-fresh.ts)
          COMMITTED_LINES=$(wc -l < src/integrations/supabase/types.ts)
          echo "Fresh schema: $FRESH_LINES lines"
          echo "Committed types.ts: $COMMITTED_LINES lines"
          THRESHOLD=$(( FRESH_LINES * 80 / 100 ))
          if [ "$COMMITTED_LINES" -lt "$THRESHOLD" ]; then
            echo "::error::src/integrations/supabase/types.ts looks truncated ($COMMITTED_LINES lines vs $FRESH_LINES expected from the live schema). Regenerate with: npx supabase gen types typescript --project-id wayawbosopwqyivacxah --schema public > src/integrations/supabase/types.ts"
            exit 1
          fi
          echo "types.ts looks complete."
